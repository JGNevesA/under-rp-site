# ============================================================
# Nginx Config — Under RP  (underrp.com.br)
# Backend Node.js rodando na porta 3001 (via PM2)
# Frontend React (build estático) servido diretamente pelo Nginx
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name underrp.com.br www.underrp.com.br;

    # Let's Encrypt challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.underrp.com.br$request_uri;
    }
}

# Redirect non-www → www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name underrp.com.br;

    ssl_certificate     /etc/letsencrypt/live/underrp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/underrp.com.br/privkey.pem;

    return 301 https://www.underrp.com.br$request_uri;
}

# Main server — www.underrp.com.br (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.underrp.com.br;

    # ── SSL (gerado pelo Certbot) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/underrp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/underrp.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # ── Backend API — /api/* → Node.js :3001 ─────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Frontend — arquivos estáticos do build React ──────────
    root /var/www/underrp/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos (JS, CSS, imagens)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
